<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pub Qualifier - Dartcafe Dubbel 10</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial Black', Arial, sans-serif;
      background: #000000;
      color: #FFFFFF;
      padding: 30px 20px;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1000px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-adc {
      width: 80px;
      height: auto;
      margin: 0 auto 10px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: bold;
      color: #FFFFFF;
      margin: 0;
    }

    .header .subtitle {
      font-size: 14px;
      color: #F26522;
      font-weight: bold;
    }

    .kroeg-section {
      text-align: center;
      margin-bottom: 20px;
    }

    .kroeg-logo {
      width: 100px;
      height: auto;
      margin: 0 auto 10px;
      display: block;
    }

    .kroeg-name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 3px;
    }

    .kroeg-plaats {
      font-size: 12px;
      color: #CCCCCC;
    }

    .dates-section {
      background: rgba(242, 101, 34, 0.1);
      border: 2px solid #F26522;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 4px;
    }

    .dates-title {
      font-size: 13px;
      font-weight: bold;
      color: #F26522;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .dates-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .date-badge {
      background: #F26522;
      color: #000000;
      padding: 8px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 10px;
      text-align: center;
    }

    .date-badge .day {
      font-size: 9px;
      display: block;
      margin-bottom: 1px;
    }

    .finales-section {
      margin-top: 15px;
    }

    .finales-title {
      font-size: 12px;
      font-weight: bold;
      color: #F26522;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .finale {
      background: rgba(255, 255, 255, 0.05);
      border-left: 3px solid #F26522;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 10px;
    }

    .finale .type {
      font-weight: bold;
      color: #FFFFFF;
      margin-bottom: 2px;
    }

    .finale .location {
      color: #F26522;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="logo-adc" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-size="28" font-weight="bold" fill="#FFFFFF">ADC</text>
        <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" font-size="13" fill="#F26522">EUROPE</text>
        <circle cx="155" cy="55" r="8" fill="#F26522"/>
      </svg>
      <h1>Pub Qualifier</h1>
      <div class="subtitle">Winmau Benelux 2026</div>
    </div>

    <div class="kroeg-section">
      <img src="assets/2026-07-07_adc_logo-dubbel10-transparant_v01.png" alt="Dartcafe Dubbel 10" class="kroeg-logo">
      <div class="kroeg-name">Dartcafe Dubbel 10</div>
      <div class="kroeg-plaats">Arnhem</div>
    </div>

    <div class="dates-section">
      <div class="dates-title">Qualifier Datums</div>
      <div class="dates-grid">
        <div class="date-badge"><span class="day">ZO</span> 27 juli</div>
        <div class="date-badge"><span class="day">ZO</span> 3 augustus</div>
        <div class="date-badge"><span class="day">ZO</span> 17 augustus</div>
        <div class="date-badge"><span class="day">ZO</span> 24 augustus</div>
      </div>
    </div>

    <div class="finales-section">
      <div class="finales-title">Regionale Finales</div>
      <div class="finale">
        <div class="type">Amateur</div>
        <div class="location">☞ Twentse Ros</div>
      </div>
      <div class="finale">
        <div class="type">Elite</div>
        <div class="location">Dubbel 10, Arnhem</div>
      </div>
    </div>
  </div>
</body>
</html>
