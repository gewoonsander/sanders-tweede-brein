<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pub Qualifier - Het Twentse Ros - Social</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', 'Helvetica', sans-serif;
      background: #000000;
      color: #FFFFFF;
    }

    /* 1080×1080px social */
    .poster {
      width: 1080px;
      height: 1080px;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow: hidden;
    }

    /* Hero embleem section: ~35% */
    .hero-section {
      height: 380px;
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      flex-shrink: 0;
    }

    .emblem-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* Banner */
    .banner {
      background: #F26522;
      color: #000000;
      padding: 16px 20px;
      text-align: center;
      flex-shrink: 0;
      border-top: 2px solid #FFFFFF;
      border-bottom: 2px solid #FFFFFF;
    }

    .banner-title {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .banner-title .subtitle {
      font-size: 18px;
      margin-top: 4px;
      opacity: 0.9;
    }

    /* Data panel: ~65% */
    .data-panel {
      flex: 1;
      background: #000000;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      overflow-y: auto;
    }

    /* Kroeg-informatie */
    .kroeg-info {
      text-align: center;
      margin-bottom: 16px;
      border-bottom: 2px solid #F26522;
      padding-bottom: 12px;
    }

    .kroeg-logo {
      width: 100px;
      height: auto;
      margin: 0 auto 10px;
      display: block;
    }

    .kroeg-name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #FFFFFF;
    }

    .kroeg-plaats {
      font-size: 14px;
      color: #F26522;
      font-weight: bold;
    }

    /* Datums sectie */
    .dates-section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14px;
      font-weight: bold;
      color: #F26522;
      text-transform: uppercase;
      margin-bottom: 10px;
      border-bottom: 1px solid #F26522;
      padding-bottom: 6px;
    }

    .dates-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .date-badge {
      background: #F26522;
      color: #000000;
      padding: 8px 4px;
      border-radius: 4px;
      text-align: center;
      font-weight: bold;
      font-size: 10px;
    }

    .date-badge .day-label {
      font-size: 8px;
      display: block;
      margin-bottom: 2px;
      opacity: 0.85;
    }

    .date-badge .date-text {
      font-size: 9px;
      font-weight: bold;
    }

    /* Finales sectie */
    .finales-section {
      margin-top: 12px;
    }

    .finale-block {
      background: rgba(242, 101, 34, 0.15);
      border-left: 3px solid #F26522;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 3px;
      font-size: 11px;
    }

    .finale-block .type {
      font-size: 12px;
      font-weight: bold;
      color: #FFFFFF;
      margin-bottom: 3px;
    }

    .finale-block .date-info {
      font-size: 10px;
      color: #CCCCCC;
      margin-bottom: 3px;
    }

    .finale-block .location {
      font-size: 10px;
      color: #F26522;
      font-weight: bold;
    }

    .finale-block .elsewhere {
      font-size: 9px;
      color: #999;
      margin-top: 2px;
    }

    .main-tournament {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #666;
      font-size: 9px;
      color: #999;
    }

    .main-tournament .label {
      font-weight: bold;
      color: #CCCCCC;
      display: block;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="poster">
    <!-- Hero embleem -->
    <div class="hero-section">
      <img src="assets/2026-07-08_adc_winmau-benelux-open-2026-full-poster_v01.png" alt="Winmau Benelux Open 2026" class="emblem-image">
    </div>

    <!-- Banner -->
    <div class="banner">
      <div class="banner-title">
        PUB QUALIFIER
        <div class="subtitle">REGIO OOST</div>
      </div>
    </div>

    <!-- Data panel -->
    <div class="data-panel">
      <!-- Kroeg-info -->
      <div class="kroeg-info">
        <img src="assets/2026-07-07_adc_logo-het-twentse-ros-wit_v01.png" alt="Het Twentse Ros" class="kroeg-logo">
        <div class="kroeg-name">Het Twentse Ros</div>
        <div class="kroeg-plaats">Hengelo</div>
      </div>

      <!-- Qualifier datums -->
      <div class="dates-section">
        <div class="section-title">Qualifiers</div>
        <div class="dates-grid">
          <div class="date-badge">
            <span class="day-label">ZO</span>
            <span class="date-text">19 jul</span>
          </div>
          <div class="date-badge">
            <span class="day-label">ZO</span>
            <span class="date-text">2 aug</span>
          </div>
          <div class="date-badge">
            <span class="day-label">ZO</span>
            <span class="date-text">9 aug</span>
          </div>
          <div class="date-badge">
            <span class="day-label">ZO</span>
            <span class="date-text">16 aug</span>
          </div>
          <div class="date-badge">
            <span class="day-label">ZO</span>
            <span class="date-text">23 aug</span>
          </div>
          <div class="date-badge">
            <span class="day-label">ZO</span>
            <span class="date-text">30 aug</span>
          </div>
          <div class="date-badge">
            <span class="day-label">ZO</span>
            <span class="date-text">13 sep</span>
          </div>
          <div class="date-badge">
            <span class="day-label">ZO</span>
            <span class="date-text">20 sep</span>
          </div>
        </div>
      </div>

      <!-- Finales -->
      <div class="finales-section">
        <div class="section-title">Finales</div>

        <div class="finale-block">
          <div class="type">Amateur</div>
          <div class="date-info">Za 26 sep</div>
          <div class="location">Bij ons!</div>
        </div>

        <div class="finale-block">
          <div class="type">Elite</div>
          <div class="date-info">Zo 27 sep</div>
          <div class="location">Dubbel 10, Arnhem</div>
        </div>

        <div class="main-tournament">
          <span class="label">Hoofdtoernooi:</span>
          Za 3 okt — Berg en Dal
        </div>
      </div>
    </div>
  </div>
</body>
</html>
