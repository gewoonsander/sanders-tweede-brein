<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pub Qualifier - Overzicht - Social</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', 'Helvetica', sans-serif;
      background: #000000;
      color: #FFFFFF;
    }

    .poster {
      width: 1080px;
      height: 1080px;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow: hidden;
    }

    .hero-section {
      height: 300px;
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      flex-shrink: 0;
    }

    .emblem-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .banner {
      background: #F26522;
      color: #000000;
      padding: 12px 20px;
      text-align: center;
      flex-shrink: 0;
      border-top: 2px solid #FFFFFF;
      border-bottom: 2px solid #FFFFFF;
    }

    .banner-title {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .banner-title .subtitle {
      font-size: 16px;
      margin-top: 3px;
      opacity: 0.9;
    }

    .data-panel {
      flex: 1;
      background: #000000;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      overflow-y: auto;
    }

    .section-title {
      font-size: 16px;
      font-weight: bold;
      color: #F26522;
      text-transform: uppercase;
      margin-bottom: 12px;
      border-bottom: 1px solid #F26522;
      padding-bottom: 8px;
    }

    .kroegen-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .kroeg-card {
      border: 1px solid #F26522;
      padding: 12px;
      background: rgba(242, 101, 34, 0.08);
      border-radius: 4px;
      text-align: center;
      font-size: 11px;
    }

    .kroeg-card-logo {
      width: 60px;
      height: auto;
      margin: 0 auto 8px;
      display: block;
    }

    .logo-badge {
      width: 80px;
      height: 80px;
      margin: 0 auto 8px;
      background: #FFFFFF;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo-badge .kroeg-card-logo {
      margin: 0;
      width: 60px;
      height: auto;
    }

    .kroeg-card-name {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 2px;
      color: #FFFFFF;
    }

    .kroeg-card-plaats {
      font-size: 10px;
      color: #F26522;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .kroeg-card-dates {
      font-size: 9px;
      color: #CCCCCC;
      line-height: 1.4;
    }

    .finales-section {
      margin-top: 8px;
      border-top: 1px solid #F26522;
      padding-top: 8px;
    }

    .finales-title {
      font-size: 12px;
      font-weight: bold;
      color: #F26522;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .finale-block {
      background: rgba(242, 101, 34, 0.1);
      border-left: 2px solid #F26522;
      padding: 8px;
      margin-bottom: 6px;
      border-radius: 3px;
      font-size: 10px;
    }

    .finale-block .type {
      font-size: 11px;
      font-weight: bold;
      color: #FFFFFF;
      margin-bottom: 2px;
    }

    .finale-block .location {
      font-size: 9px;
      color: #F26522;
      font-weight: bold;
    }

    .main-tournament {
      margin-top: 6px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px dashed #555;
      border-radius: 3px;
      font-size: 8px;
      color: #999;
    }

    .main-tournament .label {
      font-weight: bold;
      color: #F26522;
      display: block;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="poster">
    <!-- Hero embleem -->
    <div class="hero-section">
      <img src="assets/2026-07-08_adc_winmau-benelux-open-2026-full-poster_v01.png" alt="Winmau Benelux Open 2026" class="emblem-image">
    </div>

    <!-- Banner -->
    <div class="banner">
      <div class="banner-title">
        PUB QUALIFIER
        <div class="subtitle">REGIO OOST</div>
      </div>
    </div>

    <!-- Data panel -->
    <div class="data-panel">
      <!-- Kroegen grid -->
      <div class="section-title">4 Locaties</div>
      <div class="kroegen-grid">
        <div class="kroeg-card">
          <img src="assets/2026-07-07_adc_logo-het-twentse-ros-wit_v01.png" alt="Het Twentse Ros" class="kroeg-card-logo">
          <div class="kroeg-card-name">T. Ros</div>
          <div class="kroeg-card-plaats">Hengelo</div>
          <div class="kroeg-card-dates">8 datums</div>
        </div>

        <div class="kroeg-card">
          <div class="logo-badge">
            <img src="assets/2026-07-07_adc_logo-cafe-kafe_v01.png" alt="Café Kafé" class="kroeg-card-logo">
          </div>
          <div class="kroeg-card-name">Café Kafé</div>
          <div class="kroeg-card-plaats">Doetinchem</div>
          <div class="kroeg-card-dates">4 datums</div>
        </div>

        <div class="kroeg-card">
          <img src="assets/2026-07-07_adc_logo-dubbel10-transparant_v01.png" alt="Dartcafe Dubbel 10" class="kroeg-card-logo">
          <div class="kroeg-card-name">Dubbel 10</div>
          <div class="kroeg-card-plaats">Arnhem</div>
          <div class="kroeg-card-dates">4 datums</div>
        </div>

        <div class="kroeg-card">
          <div class="logo-badge">
            <img src="assets/2026-07-07_adc_logo-de-rijnvogels_v01.png" alt="Dartclub de Rijnvogels" class="kroeg-card-logo">
          </div>
          <div class="kroeg-card-name">Rijnvogels</div>
          <div class="kroeg-card-plaats">Driel</div>
          <div class="kroeg-card-dates">4 datums</div>
        </div>
      </div>

      <!-- Finales -->
      <div class="finales-section">
        <div class="finales-title">Finales</div>

        <div class="finale-block">
          <div class="type">Amateur</div>
          <div class="location">Za 26 sep — T. Ros</div>
        </div>

        <div class="finale-block">
          <div class="type">Elite</div>
          <div class="location">Zo 27 sep — Dubbel 10</div>
        </div>

        <div class="main-tournament">
          <span class="label">Hoofdtoernooi:</span>
          Za 3 okt — Berg en Dal
        </div>
      </div>
    </div>
  </div>
</body>
</html>
